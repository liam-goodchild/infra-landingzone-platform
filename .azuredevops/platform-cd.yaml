name: platform-cd

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/README.md'

pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/major/pipeline-reworks

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Versioning
    displayName: 'Git Versioning'
    jobs:
      - job: GitVersioning
        displayName: 'Create Git Tag'
        steps:
          - template: versioning/git-versioning.yaml@templates
            parameters:
              defaultAction: patch
              defaultBranch: main
