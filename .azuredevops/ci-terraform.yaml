trigger: none

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/README.md'

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Prod
  - name: additionalTfVars
    displayName: Additional Terraform Variables
    type: string
    default: ' '

variables:
  # API Keys
  - group: porkbun-secrets
  # Container, Service Connection & tfvars
  - name: backendContainerName
    value: infra-landingzone-platform
  - name: serviceConnectionName
    value: sc-platform
  - name: globalTfvars
    value: infra/vars/globals.tfvars
  - name: tfvars
    value: infra/vars/uks/$(environmentCode).tfvars
  # State Management
  - ${{ if eq(parameters.environment, 'Prod') }}:
      - name: backendResourceGroupName
        value: rg-terrastate-prd-uks-01
      - name: backendStorageAccountName
        value: stterrastateprduks01
      - name: environmentCode
        value: prd
  - ${{ else }}:
      - name: backendResourceGroupName
        value: rg-terrastate-prd-uks-01
      - name: backendStorageAccountName
        value: stterrastateprduks01
      - name: environmentCode
        value: dev

stages:
  # Stage 1: Linting
  - stage: Linting
    displayName: 'Linting & Validation'
    jobs:
      - job: SuperLinter
        displayName: 'Super-Linter'
        steps:
          - template: validation/linting.yaml@templates
            parameters:
              prettierConfigFile: .azuredevops/linters/.prettierrc.json
              checkovConfigFile: .azuredevops/linters/.checkov.yaml

  # Stage 2: Documentation
  - stage: Documentation
    displayName: 'Terraform Documentation'
    dependsOn: Linting
    condition: succeeded()
    jobs:
      - job: TerraformDocs
        displayName: 'Generate Terraform Docs'
        steps:
          - template: documentation/tf-documentation.yaml@templates
            parameters:
              terraformDir: infra
              targetBranch: $(System.PullRequest.SourceBranch)

  # Stage 3: Terraform Plan
  - stage: Plan
    displayName: 'Terraform Plan'
    dependsOn: Documentation
    condition: succeeded()
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan'
        steps:
          - checkout: self
          - script: |
              git config --global url."https://$(System.AccessToken)@dev.azure.com".insteadOf "https://dev.azure.com"
            displayName: 'Configure Git Credentials'
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
          - template: terraform/terraform-cicd.yaml@templates
            parameters:
              terraformAction: plan
              serviceConnectionName: $(serviceConnectionName)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: terraform.tfstate
              envTfvars: $(tfvars)
              globalTfvars: $(globalTfvars)
              additionalCommandOptions: ${{ parameters.additionalTfVars }}
              publishPlan: false
              ensureBackendContainer: true
              environmentVariables:
                PORKBUN_API_KEY: $(PORKBUN_API_KEY)
                PORKBUN_SECRET_API_KEY: $(PORKBUN_SECRET_API_KEY)
