trigger: none

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/README.md'

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: terraformAction
    displayName: Terraform Action
    type: string
    default: Plan
    values: [Plan, Apply, Destroy]

variables:
  # Container, Service Connection & tfvars
  - name: backendContainerName
    value: infra-landingzone-platform
  - name: serviceConnectionName
    value: sc-platform
  - name: globalTfvars
    value: infra/vars/globals.tfvars
  - name: tfvars
    value: infra/vars/prd.tfvars
  # State Management
  - name: backendResourceGroupName
    value: rg-tfs-platform-prd-uks-01
  - name: backendStorageAccountName
    value: sttfsplatformprduks01

stages:
  # Stage 1: Linting (PR only)
  - stage: Linting
    displayName: 'Linting & Validation'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: SuperLinter
        displayName: 'Super-Linter'
        steps:
          - template: validation/linting.yaml@templates
            parameters:
              prettierConfigFile: .azuredevops/linters/.prettierrc.json
              checkovConfigFile: .azuredevops/linters/.checkov.yaml

  # Stage 2: Terraform (manual runs only)
  - stage: Terraform
    displayName: 'Terraform ${{ parameters.terraformAction }}'
    dependsOn: Linting
    condition: |
      and(
        not(failed('Linting')),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: TerraformAction
        displayName: 'Terraform ${{ parameters.terraformAction }}'
        steps:
          - checkout: self
          - script: |
              git config --global url."https://$(System.AccessToken)@dev.azure.com".insteadOf "https://dev.azure.com"
            displayName: 'Configure Git Credentials'
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
          - task: AzureKeyVault@2
            displayName: 'Fetch Porkbun Secrets'
            inputs:
              azureSubscription: $(serviceConnectionName)
              KeyVaultName: kv-platform-prd-uks-01
              SecretsFilter: 'porkbun-api-key,porkbun-secret-api-key'
              RunAsPreJob: false
          - template: terraform/terraform-dev.yaml@templates
            parameters:
              terraformAction: ${{ lower(parameters.terraformAction) }}
              tfVersion: '1.14.8'
              serviceConnectionName: $(serviceConnectionName)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: terraform.tfstate
              envTfvars: $(tfvars)
              globalTfvars: $(globalTfvars)
              additionalCommandOptions: ${{ parameters.additionalTfVars }}
              environmentVariables:
                PORKBUN_API_KEY: $(porkbun-api-key)
                PORKBUN_SECRET_API_KEY: $(porkbun-secret-api-key)
