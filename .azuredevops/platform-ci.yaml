name: platform-ci

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/README.md'

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Linting
    displayName: 'Linting & Validation'
    jobs:
      - job: SuperLinter
        displayName: 'Super-Linter'
        steps:
          - template: linting/super-linter.yaml@templates
            parameters:
              prettierConfigFile: .prettierrc.json
              prettierIgnoreFile: .prettierignore
              checkovConfigFile: .checkov.yaml
              tflintConfigFile: .tflint.hcl
